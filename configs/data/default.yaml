train_path: data/train_data/train.zarr
val_path: data/train_data/val_era5_region1.zarr
batch_size: ${batch_size}
num_workers: 4
threads_limit: shared
pin_memory: true
persistent_workers: true

# Data augmentation settings
augmentation:
  enabled: true
  horizontal_flip: true
  vertical_flip: true
  rotation: true
  brightness: false
  contrast: false
  crop: false
  # crop_size: [128, 128]  # Uncomment and set if crop is enabled
  seed: null  # Set to an integer for reproducible augmentations